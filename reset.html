<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>초기화 중...</title>
<style>
  body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; background: #f5f5f5; }
  .box { text-align: center; padding: 32px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #ddd;
             border-top-color: #00b8a9; border-radius: 50%;
             animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #555; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p id="msg">캐시 초기화 중...</p>
</div>
<script>
(async function () {
  try {
    // 1. 모든 서비스워커 등록 해제
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function (r) { return r.unregister(); }));
    }
    // 2. 모든 캐시 삭제
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(function (k) { return caches.delete(k); }));
    }
    document.getElementById('msg').textContent = '완료! 잠시 후 이동합니다...';
  } catch (e) {
    document.getElementById('msg').textContent = '초기화 완료. 이동합니다...';
  }
  // 3. 메인 페이지로 이동 (이제 SW 없음 → 서버에서 최신 버전 직접 수신)
  setTimeout(function () {
    location.href = './';
  }, 800);
})();
</script>
</body>
</html>
